<svg width="100%" viewBox="0 0 340 450" xmlns="http://www.w3.org/2000/svg">
  <title>BY-Back — 2026 Growing Plan</title>
  <defs>
    <marker id="na" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#111827">BY-Back · 5 × 11 ft</text>
  <text x="150" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d97706">◐ Part–full sun · 4–6 hrs</text>

  <!-- N arrow -->
  <line x1="300" y1="74" x2="300" y2="54" stroke="#6b7280" stroke-width="1.5" marker-end="url(#na)"/>
  <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">N</text>

  <!-- Bed: x=80, y=50, w=140 (5ft×28), h=308 (11ft×28) -->

  <!-- ── Zone 1: Sungold Tomatoes (north, 2 ft) y=50–106 ── -->
  <rect x="80" y="50" width="140" height="56" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="150" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Sungold tomatoes × 3</text>
  <text x="150" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">cordon-trained · proven here</text>

  <!-- Stake lines -->
  <line x1="100" y1="50" x2="100" y2="83" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="150" y1="50" x2="150" y2="83" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="200" y1="50" x2="200" y2="83" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Sungold circles (all 3) -->
  <circle cx="100" cy="95" r="11" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="100" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#78350f">SG</text>
  <circle cx="150" cy="95" r="11" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#78350f">SG</text>
  <circle cx="200" cy="95" r="11" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#78350f">SG</text>

  <!-- ── Zone 2: Peas on trellis (2 ft) y=106–162 ── -->
  <rect x="80" y="106" width="140" height="56" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="150" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Peas on trellis</text>
  <text x="150" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6d28d9">along east fence · sow now</text>

  <!-- Trellis grid -->
  <line x1="100" y1="143" x2="100" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="120" y1="143" x2="120" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="140" y1="143" x2="140" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="160" y1="143" x2="160" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="180" y1="143" x2="180" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="200" y1="143" x2="200" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="85"  y1="150" x2="215" y2="150" stroke="#7c3aed" stroke-width="0.75"/>

  <!-- ── Zone 3: Brassicas (3.5 ft) y=162–260 ── -->
  <rect x="80" y="162" width="140" height="98" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Brassicas × 3</text>
  <text x="150" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e40af">2× broccoli · 1× cabbage</text>
  <!-- Broccoli × 2 -->
  <circle cx="100" cy="228" r="14" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Broc</text>
  <circle cx="200" cy="228" r="14" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Broc</text>
  <!-- Cabbage × 1 -->
  <circle cx="150" cy="228" r="14" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="150" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Cab</text>

  <!-- ── Zone 4: Chard + herbs (3.5 ft) y=260–358 ── -->
  <rect x="80" y="260" width="140" height="98" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="150" y="277" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0e7490">Chard × 3</text>
  <!-- Chard circles -->
  <circle cx="100" cy="305" r="13" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
  <text x="100" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Ch</text>
  <circle cx="150" cy="305" r="13" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
  <text x="150" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Ch</text>
  <circle cx="200" cy="305" r="13" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
  <text x="200" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Ch</text>
  <!-- Cilantro/parsley -->
  <text x="150" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0e7490">Cilantro · parsley</text>
  <text x="150" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#164e63">(south end)</text>

  <!-- Outer bed border -->
  <rect x="80" y="50" width="140" height="308" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- East fence label -->
  <text x="232" y="208" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af" transform="rotate(90,232,208)">← East fence</text>

  <!-- Dimension: 5 ft width -->
  <line x1="80"  y1="372" x2="220" y2="372" stroke="#9ca3af" stroke-width="1"/>
  <line x1="80"  y1="366" x2="80"  y2="378" stroke="#9ca3af" stroke-width="1"/>
  <line x1="220" y1="366" x2="220" y2="378" stroke="#9ca3af" stroke-width="1"/>
  <text x="150" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">5 ft</text>

  <!-- Dimension: 11 ft height -->
  <line x1="56" y1="50"  x2="56" y2="358" stroke="#9ca3af" stroke-width="1"/>
  <line x1="50" y1="50"  x2="62" y2="50"  stroke="#9ca3af" stroke-width="1"/>
  <line x1="50" y1="358" x2="62" y2="358" stroke="#9ca3af" stroke-width="1"/>
  <text x="38" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90,38,204)">11 ft</text>

  <!-- Orientation -->
  <text x="150" y="406" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">↑ North (shed)     ↓ South (house)</text>

  <!-- Legend -->
  <text x="80" y="424" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4b5563">SG = Sungold (cherry) tomato</text>
</svg>
