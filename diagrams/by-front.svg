<svg width="100%" viewBox="0 0 340 490" xmlns="http://www.w3.org/2000/svg">
  <title>BY-Front — 2026 Growing Plan</title>
  <defs>
    <marker id="na" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#111827">BY-Front · 5 × 12 ft</text>
  <text x="150" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">● Mostly shade · 2–3 hrs</text>

  <!-- N arrow -->
  <line x1="300" y1="74" x2="300" y2="54" stroke="#6b7280" stroke-width="1.5" marker-end="url(#na)"/>
  <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">N</text>

  <!-- Bed: x=80, y=50, w=140 (5ft×28), h=336 (12ft×28) -->

  <!-- ── Zone 1: Lettuce (north half, 5 ft) y=50–190 ── -->
  <rect x="80" y="50" width="140" height="140" fill="#f7fee7" stroke="#d9f99d" stroke-width="1"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3f6212">Lettuce</text>
  <text x="150" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4d7c0f">Shade keeps it tender</text>
  <text x="150" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4d7c0f">and slow-bolting</text>
  <text x="150" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4d7c0f">all summer</text>
  <text x="150" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#65a30d">Cut-and-come-again</text>
  <text x="150" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#65a30d">re-sow every 3 weeks</text>

  <!-- ── Zone 2: Spinach (3 ft) y=190–274 ── -->
  <rect x="80" y="190" width="140" height="84" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="150" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14532d">Spinach</text>
  <text x="150" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534">Shade extends</text>
  <text x="150" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534">the season</text>

  <!-- ── Zone 3: Arugula (2 ft) y=274–330 ── -->
  <rect x="80" y="274" width="140" height="56" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="150" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Arugula</text>
  <text x="150" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Less bitter in shade</text>

  <!-- ── Zone 4: Miner's lettuce (2 ft) y=330–386 ── -->
  <rect x="80" y="330" width="140" height="56" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="150" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Miner's lettuce</text>
  <text x="150" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">(claytonia) · self-seeds</text>

  <!-- Outer bed border -->
  <rect x="80" y="50" width="140" height="336" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- Pear tree shadow note -->
  <rect x="80" y="50" width="140" height="336" fill="#94a3b8" opacity="0.07" rx="0"/>
  <text x="232" y="120" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">← pear tree</text>
  <text x="232" y="133" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">   shadow</text>

  <!-- East fence label -->
  <text x="232" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af" transform="rotate(90,232,250)">← East border</text>

  <!-- Dimension: 5 ft width -->
  <line x1="80"  y1="400" x2="220" y2="400" stroke="#9ca3af" stroke-width="1"/>
  <line x1="80"  y1="394" x2="80"  y2="406" stroke="#9ca3af" stroke-width="1"/>
  <line x1="220" y1="394" x2="220" y2="406" stroke="#9ca3af" stroke-width="1"/>
  <text x="150" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">5 ft</text>

  <!-- Dimension: 12 ft depth -->
  <line x1="56" y1="50"  x2="56" y2="386" stroke="#9ca3af" stroke-width="1"/>
  <line x1="50" y1="50"  x2="62" y2="50"  stroke="#9ca3af" stroke-width="1"/>
  <line x1="50" y1="386" x2="62" y2="386" stroke="#9ca3af" stroke-width="1"/>
  <text x="38" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90,38,218)">12 ft</text>

  <!-- Orientation -->
  <text x="150" y="434" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">↑ North (adjacent to BY-Back)     ↓ South</text>

  <!-- Notes -->
  <text x="80"  y="454" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563" font-weight="600">Notes:</text>
  <text x="80"  y="469" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">· Avoid fruiting crops here — pear tree shadow increases after May.</text>
  <text x="80"  y="482" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">· Miner's lettuce self-seeds — let it naturalise in gaps.</text>
</svg>
