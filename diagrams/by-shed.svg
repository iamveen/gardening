<svg width="100%" viewBox="0 0 440 290" xmlns="http://www.w3.org/2000/svg">
  <title>BY-Shed — 2026 Growing Plan</title>
  <defs>
    <marker id="na" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="186" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#111827">BY-Shed · 9 × 4 ft</text>
  <text x="186" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">◑ Part shade · 3–4 hrs</text>

  <!-- N arrow -->
  <line x1="408" y1="74" x2="408" y2="54" stroke="#6b7280" stroke-width="1.5" marker-end="url(#na)"/>
  <text x="408" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">N</text>

  <!-- Bed: x=60, y=60, w=252 (9ft×28), h=112 (4ft×28)
       Main zones: y=60–144 (h=84, 3ft)
       Strawberry strip: y=144–172 (h=28, 1ft) -->

  <!-- ── Zone A: Lettuce — x=60–172, y=60–144 ── -->
  <rect x="60" y="60" width="112" height="84" fill="#f7fee7" stroke="#d9f99d" stroke-width="1"/>
  <text x="116" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3f6212">Lettuce</text>
  <text x="116" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4d7c0f">cut-and-come-again</text>
  <text x="116" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4d7c0f">re-sow every 3 weeks</text>

  <!-- ── Zone B: Spinach + Arugula — x=172–256, y=60–144 ── -->
  <rect x="172" y="60" width="84" height="84" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="214" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#14532d">Spinach</text>
  <text x="214" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#14532d">+ Arugula</text>
  <text x="214" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">shade slows bolting</text>

  <!-- ── Zone C: Herbs — x=256–312, y=60–144 ── -->
  <rect x="256" y="60" width="56" height="84" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="284" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#713f12">Chives</text>
  <text x="284" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#713f12">Mint</text>
  <text x="284" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#92400e">(pots)</text>

  <!-- ── Strawberry strip (south edge, 1 ft) y=144–172 ── -->
  <rect x="60" y="144" width="252" height="28" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="186" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9f1239">🍓 Strawberries × 6–8 · along south (front) edge</text>

  <!-- Outer bed border -->
  <rect x="60" y="60" width="252" height="112" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- Shed label at top -->
  <text x="186" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af">↑ Shed (north)</text>

  <!-- Dimension: 9 ft width -->
  <line x1="60"  y1="186" x2="312" y2="186" stroke="#9ca3af" stroke-width="1"/>
  <line x1="60"  y1="180" x2="60"  y2="192" stroke="#9ca3af" stroke-width="1"/>
  <line x1="312" y1="180" x2="312" y2="192" stroke="#9ca3af" stroke-width="1"/>
  <text x="186" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">9 ft</text>

  <!-- Dimension: 4 ft depth -->
  <line x1="36" y1="60"  x2="36" y2="172" stroke="#9ca3af" stroke-width="1"/>
  <line x1="30" y1="60"  x2="42" y2="60"  stroke="#9ca3af" stroke-width="1"/>
  <line x1="30" y1="172" x2="42" y2="172" stroke="#9ca3af" stroke-width="1"/>
  <text x="18" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90,18,116)">4 ft</text>

  <!-- Orientation -->
  <text x="186" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">↑ North · shed wall          ↓ South · house</text>

  <!-- Notes -->
  <text x="60"  y="242" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563" font-weight="600">Notes:</text>
  <text x="60"  y="257" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">· Mint must be planted in sunken pots — it will otherwise spread uncontrollably.</text>
  <text x="60"  y="272" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">· Chives are perennial — plant once, divide every 2–3 years.</text>
</svg>
