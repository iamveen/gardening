<svg width="100%" viewBox="0 0 520 430" xmlns="http://www.w3.org/2000/svg">
  <title>FY-Square — 2026 Growing Plan</title>
  <defs>
    <marker id="na" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="242" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#111827">FY-Square · 13 × 9 ft</text>
  <text x="242" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b45309">☀ Full sun · 6–8+ hrs</text>

  <!-- N arrow -->
  <line x1="490" y1="74" x2="490" y2="54" stroke="#6b7280" stroke-width="1.5" marker-end="url(#na)"/>
  <text x="490" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">N</text>

  <!-- ── ZONE 1: Tomatoes (north edge, 3 ft) y=50–134 ── -->
  <rect x="60" y="50" width="364" height="84" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="68" y="67" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Tomatoes × 7 · cordon-trained, staked — north/back edge</text>

  <!-- Stake lines -->
  <line x1="86"  y1="50" x2="86"  y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="138" y1="50" x2="138" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="190" y1="50" x2="190" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="242" y1="50" x2="242" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="294" y1="50" x2="294" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="346" y1="50" x2="346" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="398" y1="50" x2="398" y2="87" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Tomato plant circles (y=100, spacing ~52 px = ~22 in) -->
  <!-- Sungold × 2 -->
  <circle cx="86"  cy="100" r="12" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="86"  y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#78350f">SG</text>
  <circle cx="138" cy="100" r="12" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="138" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#78350f">SG</text>
  <!-- Stupice × 1 -->
  <circle cx="190" cy="100" r="12" fill="#fb923c" stroke="#c2410c" stroke-width="1.5"/>
  <text x="190" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">St</text>
  <!-- Legend × 2 -->
  <circle cx="242" cy="100" r="12" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="242" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Le</text>
  <circle cx="294" cy="100" r="12" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="294" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Le</text>
  <!-- Siletz × 1 -->
  <circle cx="346" cy="100" r="12" fill="#9a3412" stroke="#7c2d12" stroke-width="1.5"/>
  <text x="346" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Si</text>
  <!-- Stupice × 1 -->
  <circle cx="398" cy="100" r="12" fill="#fb923c" stroke="#c2410c" stroke-width="1.5"/>
  <text x="398" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">St</text>

  <!-- ── ZONE 2a: Peppers — x=60–181, y=134–246 ── -->
  <rect x="60" y="134" width="121" height="112" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="120" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9a3412">Peppers × 4</text>
  <circle cx="95"  cy="176" r="11" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>
  <circle cx="146" cy="176" r="11" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>
  <circle cx="95"  cy="218" r="11" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>
  <circle cx="146" cy="218" r="11" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>

  <!-- ── ZONE 2b: Basil — x=181–302, y=134–246 ── -->
  <rect x="181" y="134" width="121" height="112" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="241" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#14532d">Basil × 4</text>
  <circle cx="217" cy="176" r="10" fill="#22c55e" stroke="#15803d" stroke-width="1.5"/>
  <circle cx="265" cy="176" r="10" fill="#22c55e" stroke="#15803d" stroke-width="1.5"/>
  <circle cx="217" cy="218" r="10" fill="#22c55e" stroke="#15803d" stroke-width="1.5"/>
  <circle cx="265" cy="218" r="10" fill="#22c55e" stroke="#15803d" stroke-width="1.5"/>

  <!-- ── ZONE 2c: Zucchini / Cucumber — x=302–424, y=134–246 ── -->
  <rect x="302" y="134" width="122" height="112" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="363" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Zucchini</text>
  <text x="363" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#065f46">or Cucumber</text>
  <circle cx="363" cy="198" r="26" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="363" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#064e3b">× 1–2</text>

  <!-- ── ZONE 3: Succession greens (south edge, 2 ft) y=246–302 ── -->
  <rect x="60" y="246" width="364" height="56" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="242" y="267" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#713f12">Succession salad greens — south/front edge</text>
  <text x="242" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Lettuce · spinach · radishes — re-sow every 3 weeks</text>

  <!-- Outer bed border -->
  <rect x="60" y="50" width="364" height="252" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- Dimension: 13 ft width -->
  <line x1="60"  y1="316" x2="424" y2="316" stroke="#9ca3af" stroke-width="1"/>
  <line x1="60"  y1="310" x2="60"  y2="322" stroke="#9ca3af" stroke-width="1"/>
  <line x1="424" y1="310" x2="424" y2="322" stroke="#9ca3af" stroke-width="1"/>
  <text x="242" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">13 ft</text>

  <!-- Dimension: 9 ft depth -->
  <line x1="36" y1="50"  x2="36" y2="302" stroke="#9ca3af" stroke-width="1"/>
  <line x1="30" y1="50"  x2="42" y2="50"  stroke="#9ca3af" stroke-width="1"/>
  <line x1="30" y1="302" x2="42" y2="302" stroke="#9ca3af" stroke-width="1"/>
  <text x="18" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90,18,176)">9 ft</text>

  <!-- Orientation -->
  <text x="242" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">↑ North · toward house          ↓ South · toward street</text>

  <!-- Tomato variety legend -->
  <text x="60" y="370" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4b5563">Tomato varieties:</text>
  <circle cx="75"  cy="385" r="7" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="87"  y="389" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">SG = Sungold (cherry) × 2</text>
  <circle cx="75"  cy="403" r="7" fill="#fb923c" stroke="#c2410c" stroke-width="1"/>
  <text x="87"  y="407" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">St = Stupice (early slicer) × 2</text>
  <circle cx="240" cy="385" r="7" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  <text x="252" y="389" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Le = Legend (blight resistant) × 2</text>
  <circle cx="240" cy="403" r="7" fill="#9a3412" stroke="#7c2d12" stroke-width="1"/>
  <text x="252" y="407" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Si = Siletz (PNW determinate) × 1</text>
</svg>
